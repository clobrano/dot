kubectl_bin: kubectl
pager: less
tabs:
    - name: Nodes
      command: get nodes
    - name: RHWA
      command: get pods -n openshift-workload-availability
    - name: ServiceMonitor
      command: get servicemonitor -n openshift-workload-availability
    - name: SBR
      command: get pods -A -l app.kubernetes.io/name=sbr-operator
    - name: SBR daemonset
      command: get daemonsets -A -l app=sbr-agent
    - name: SBR agent pods
      command: get pods -A -l app=sbr-agent
    - name: CEO
      command: get pods -n openshift-etcd-operator
    - name: ETCD
      command: get pods -n openshift-etcd
    - name: Secrets
      command: get Secrets -A
    - name: ConfigMap
      command: get ConfigMap -A
custom_commands: []
