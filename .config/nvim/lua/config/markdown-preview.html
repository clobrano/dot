<style>
body {
  font-family: "Source Code Pro", "Fira Code", "JetBrains Mono", monospace;
  max-width: 960px;
  margin: 2rem auto;
  padding: 0 2rem;
  line-height: 1.6;
  color: #4c4f69;
  background: #eff1f5;
}

h1, h2, h3, h4 { color: #4c4f69; }
h1 { border-bottom: 1px solid #ccd0da; padding-bottom: 0.4em; }
h2 { border-bottom: 1px solid #dce0e8; padding-bottom: 0.3em; }

a { color: #1e66f5; }
a:visited { color: #7287fd; }
a:hover { color: #209fb5; }

code {
  background: #e6e9ef;
  padding: 0.15em 0.4em;
  border-radius: 4px;
  font-size: 0.9em;
}

pre {
  background: #dce0e8;
  padding: 1em;
  border-radius: 6px;
  overflow-x: auto;
}
pre code { background: none; padding: 0; }

.wikilink {
  background: #1e66f522;
  color: #1e66f5;
  padding: 0.1em 0.4em;
  border-radius: 3px;
  font-weight: 600;
}

blockquote {
  border-left: 3px solid #1e66f5;
  margin-left: 0;
  padding-left: 1em;
  color: #6c6f85;
}

table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ccd0da; padding: 0.5em 0.8em; }
th { background: #e6e9ef; }

.diagram-container {
  position: relative;
  overflow: hidden;
  border: 1px solid #ccd0da;
  border-radius: 6px;
  background: #fff;
  margin: 1em 0;
  cursor: grab;
  min-height: 400px;
}
.diagram-container:active { cursor: grabbing; }
.diagram-container .diagram-inner {
  transform-origin: 0 0;
  padding: 1em;
}
.diagram-container .diagram-inner svg {
  width: 100%;
  height: auto;
}
.diagram-controls {
  position: absolute;
  top: 0.4em;
  right: 0.4em;
  display: flex;
  gap: 0.2em;
  z-index: 1;
}
.diagram-controls button {
  width: 1.8em;
  height: 1.8em;
  border: 1px solid #ccd0da;
  border-radius: 4px;
  background: #eff1f5;
  color: #4c4f69;
  font-size: 0.9em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.diagram-controls button:hover { background: #dce0e8; }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // Convert pandoc mermaid code blocks into mermaid divs
  document.querySelectorAll('pre.mermaid').forEach(function(pre) {
    var code = pre.querySelector('code');
    var div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = code ? code.textContent : pre.textContent;
    pre.replaceWith(div);
  });
  mermaid.initialize({ startOnLoad: true, theme: 'default' });

  // After mermaid renders, wrap each diagram in a zoom/pan container
  setTimeout(function() {
    document.querySelectorAll('.mermaid').forEach(function(el) {
      var container = document.createElement('div');
      container.className = 'diagram-container';
      var inner = document.createElement('div');
      inner.className = 'diagram-inner';
      el.parentNode.insertBefore(container, el);
      inner.appendChild(el);
      container.appendChild(inner);

      var controls = document.createElement('div');
      controls.className = 'diagram-controls';
      controls.innerHTML = '<button data-action="in" title="Zoom in">+</button>'
        + '<button data-action="out" title="Zoom out">&minus;</button>'
        + '<button data-action="reset" title="Reset">&#8634;</button>';
      container.appendChild(controls);

      var scale = 1, tx = 0, ty = 0;
      function apply() {
        inner.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
      }

      controls.addEventListener('click', function(e) {
        var btn = e.target.closest('button');
        if (!btn) return;
        var action = btn.dataset.action;
        if (action === 'in') scale = Math.min(scale * 1.25, 5);
        else if (action === 'out') scale = Math.max(scale / 1.25, 0.2);
        else { scale = 1; tx = 0; ty = 0; }
        apply();
      });

      container.addEventListener('wheel', function(e) {
        e.preventDefault();
        if (e.deltaY < 0) scale = Math.min(scale * 1.1, 5);
        else scale = Math.max(scale / 1.1, 0.2);
        apply();
      }, { passive: false });

      var dragging = false, startX, startY;
      container.addEventListener('mousedown', function(e) {
        if (e.target.closest('.diagram-controls')) return;
        dragging = true; startX = e.clientX - tx; startY = e.clientY - ty;
      });
      window.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        tx = e.clientX - startX; ty = e.clientY - startY;
        apply();
      });
      window.addEventListener('mouseup', function() { dragging = false; });
    });
  }, 500);

  var tagColors = {
    "forum":   "#d20f39",
    "meeting": "#40a02b",
    "bug":     "#fe640b",
    "rfe":     "#04a5e5",
    "jira":    "#8839ef",
  };
  var defaultTagColor = "#df8e1d";

  document.querySelectorAll("p, li, td, th").forEach(function(el) {
    el.innerHTML = el.innerHTML.replace(/(#[A-Za-z0-9_-]+)/g, function(match) {
      var lower = match.toLowerCase();
      var color = defaultTagColor;
      for (var key in tagColors) {
        if (lower.indexOf(key) !== -1) { color = tagColors[key]; break; }
      }
      return '<span style="background:' + color + '22;color:' + color +
        ';padding:0.1em 0.4em;border-radius:3px;font-weight:600;">' + match + '</span>';
    });
  });
});
</script>
