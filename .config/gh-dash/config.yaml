prSections:
- title: My Pull Requests
  filters: is:open author:@me
  type: null
- title: Needs My Review
  filters: is:open review-requested:@me
  type: null
- title: Involved
  filters: is:open involves:@me -author:@me
  type: null
issuesSections:
- title: My Issues
  filters: is:open author:@me
- title: Assigned
  filters: is:open assignee:@me
- title: Involved
  filters: is:open involves:@me -author:@me
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
repoPaths:
  openshift/*: ~/workspace/github/openshift/*
  medik8s/*: ~/workspace/github/medik8s/*
  clobrano/*: ~/workspace/github/clobrano/*
  clusterlabs/*: ~/workspace/github/clusterlabs/*
defaults:
  sectionsWidth: 50
  preview:
    open: true
    width: 100
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  universal: []
  issues: []
  prs:
  - key: O
    builtin: checkout
  - key: C
    command: >
        tmux new-window -c {{.RepoPath}} '
        nvim -c ":silent Octo pr edit {{.PrNumber}}"
        '
    #command: gh-dash-create-or-checkout.sh {{.RepoName}} {{.PrNumber}} >/dev/null  && tmux new-window -c ~/workspace/codeReviews/{{.RepoName}}
  - key: c
    # This command opens Neovim with two buffers: one for reading comments, one for writing.
    command: "touch comment.md && nvim -c 'set buftype=nofile' -c 'read !gh pr view {{.PrNumber}} --comments' -c 'set nomodifiable' -c 'split comment.md' -c 'set ft=markdown modifiable' -c 'startinsert' && gh pr comment {{.PrNumber}} --body-file=comment.md && rm comment.md"
    confirm: false
  branches: []
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
pager:
  diff: "delta --side-by-side"
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
