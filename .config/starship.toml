# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

[directory]
truncation_length = 3
truncate_to_repo = false

[custom.git_user]
when = "git rev-parse --is-inside-work-tree"
require_repo = true
command = "if git config user.email | grep redhat >/dev/null; then echo \" \"; else if git config user.email | grep gmail >/dev/null; then echo \" \"; else echo \" \"; fi; fi"
style = "bold yellow"
ignore_timeout = true

[git_branch]
symbol = ' '
format = 'on [$symbol$branch]($style) '

[git_commit]
tag_disabled = false

[golang]
symbol = "GO "
format = '$symbol[($version )]($style)'

[python]
symbol = "PY "
format = '$symbol[($version )]($style)'

[hostname]
format='[$hostname]($style) '

[time]
format = '[$time]($style) '
disabled = false

[container]
# for toolbox
style = 'bold green dimmed'
format = '[$symbol]($style) '
disabled = false

[gcloud]
disabled = true

[aws]
disabled = true

[kubernetes]
disabled = true

[custom.kube]
when = "test -n \"$KUBECONFIG\" && test -f \"$KUBECONFIG\" || test -f $KUBE/config"
command = '''
server=$(kubectl config view --minify --output 'jsonpath={.clusters[0].cluster.server}' 2>/dev/null)
cluster=$(echo "$server" | sed -n 's|https\?://api\.\([^.]*\)\..*|\1|p')
cluster=${cluster:-$(kubectl config current-context 2>/dev/null || echo "unknown")}
ns=$(kubectl config view --minify --output 'jsonpath={..namespace}' 2>/dev/null)
label="☸ $cluster"
if [ -n "$ns" ] && [ "$ns" != "default" ]; then
  label="$label:$ns"
fi
if kubectl cluster-info --request-timeout=2s >/dev/null 2>&1; then
  echo "$label"
else
  echo "$label ⚠"
fi
'''
style = "dimmed blue"
format = '[$output]($style) '
ignore_timeout = true
shell = ["bash", "--noprofile", "--norc"]
