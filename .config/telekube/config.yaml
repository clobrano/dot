kubectl_bin: kubectl
pager: less
refresh_interval: 5s
logs_follow_in_new_shell: true
keybindings:
    quit: q
    help: '?'
    refresh: r
    search: /
    describe: d
    logs: L
    delete: D
    edit: e
    terminal: T
    port_forward: p
    scale: s
    yaml_view: "Y"
    json_view: J
    switch_namespace: "n"
    switch_context: c
    copy_data: c
    multi_select: ' '
    enter: enter
    escape: esc
    up: up
    down: down
    tab_next: tab
    tab_prev: shift+tab
    delete_tab: '-'
tabs:
    - name: Pods
      command: pods -A
    - name: Deployments
      command: deployments -A
    - name: Services
      command: services -A
    - name: Subs
      command: subs -n openshift-workload-availability
    - name: Jobs
      command: jobs -A
    - name: OSAC
      command: pods -n osac-e2e-ci
custom_commands: []
