prSections:
- title: Medik8s
  filters: is:open org:medik8s
  type: null
- title: Involved
  filters: is:open involves:@me -author:@me
  type: null
- title: Needs My Review
  filters: is:open review-requested:@me
  type: null
- title: My Pull Requests
  filters: is:open author:@me
  type: null
- title: Dependabot
  filters: is:open org:medik8s dependabot
  type: null
issuesSections:
- title: My Issues
  filters: is:open author:@me
- title: Assigned
  filters: is:open assignee:@me
- title: Involved
  filters: is:open involves:@me -author:@me
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
repoPaths:
  openshift/*: ~/workspace/codeReviews/openshift/*
  medik8s/*: ~/workspace/codeReviews/medik8s/*
  clobrano/*: ~/workspace/codeReviews/clobrano/*
  ClusterLabs/*: ~/workspace/codeReviews/ClusterLabs/*
defaults:
  sectionsWidth: 50
  preview:
    open: false
    width: 100
  prApproveComment: /lgtm
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  universal: []
  issues: []
  prs:
  - key: d
    name: sticky diff
    command: >
      gh pr diff {{.PrNumber}} --repo {{.RepoName}} | delta --side-by-side --paging=always
  - key: V
    name: approve with hold
    command: >
      gh pr review {{.PrNumber}} --repo {{.RepoName}} --approve --body $'/lgtm\ngiving the chance to get more reviews\n/hold'
  - key: O
    builtin: checkout
  - key: C
    command: >
        tmux new-window -c {{.RepoPath}} ' nvim -c ":silent Octo pr edit {{.PrNumber}}" '
  branches: []
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
pager:
  diff: "delta --side-by-side"
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
